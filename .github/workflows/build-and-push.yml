name: Build and Push Images

on:
  push:
    branches: [dev]
    tags: ['v*']

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME#v}"
            if ! [[ "$TAG" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
              echo "::error::Invalid release tag: ${GITHUB_REF_NAME}. Expected v<semver>, e.g. v1.2.3"
              exit 1
            fi
            echo "IMAGE_TAG=${TAG}" >> "$GITHUB_OUTPUT"
          else
            SHA_SHORT=$(git rev-parse --short HEAD)
            echo "IMAGE_TAG=0.${{ github.run_number }}.0-rc.${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          fi
