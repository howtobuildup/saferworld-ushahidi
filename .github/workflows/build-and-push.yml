name: Build and Push Images

on:
  push:
    branches: [dev]
    tags: ['v*']

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME#v}"
            if ! [[ "$TAG" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
              echo "::error::Invalid release tag: ${GITHUB_REF_NAME}. Expected v<semver>, e.g. v1.2.3"
              exit 1
            fi
            echo "IMAGE_TAG=${TAG}" >> "$GITHUB_OUTPUT"
          else
            SHA_SHORT=$(git rev-parse --short HEAD)
            echo "IMAGE_TAG=0.${{ github.run_number }}.0-rc.${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./platform
          push: true
          tags: ghcr.io/howtobuildup/platform:${{ steps.tag.outputs.IMAGE_TAG }}
          cache-from: type=gha,scope=platform-api
          cache-to: type=gha,mode=max,scope=platform-api
          build-args: |
            GIT_COMMIT_ID=${{ github.sha }}
            GIT_BUILD_REF=${{ github.ref_name }}

      - name: Build and push Client image
        uses: docker/build-push-action@v6
        with:
          context: ./platform-client-mzima
          push: true
          tags: ghcr.io/howtobuildup/platform-client:${{ steps.tag.outputs.IMAGE_TAG }}
          cache-from: type=gha,scope=platform-client
          cache-to: type=gha,mode=max,scope=platform-client
          build-args: |
            build_target=web:build
